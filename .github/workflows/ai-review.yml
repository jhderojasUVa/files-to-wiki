name: AI Documentation Reviewer

on:
  pull_request:
    paths:
      - 'wiki/**/*.md'

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Needed to post comments on the PR
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so we can diff against the base branch
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests
          
      - name: Get Changed Files
        id: changed-files
        run: |
          # Find markdown files in the wiki directory that changed in this PR
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^wiki/.*\.md$' || true)
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
      - name: Run AI Review Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: To use GitHub Models, you may need to pass a Personal Access Token 
          # (with Copilot/Models access) if the default GITHUB_TOKEN doesn't have access.
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/ai_doc_reviewer.py

name: Sync Wiki to GitHub Wiki repo

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**'
      - '.github/workflows/update-wiki.yml'
  workflow_dispatch:

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Sidebar
        run: |
          python scripts/generate_sidebar.py

      - name: Copy Wiki Contents to separate directory
        run: |
          mkdir /tmp/wiki-build
          cp -R wiki/* /tmp/wiki-build/

      - name: Checkout Wiki Repository
        env:
          WIKI_REPO: https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: |
          git clone $WIKI_REPO .wiki || echo "Wiki repo not found or empty. It will be initialized in the next step." 
          
      - name: Deploy to Wiki
        env:
          WIKI_REPO: https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: |
          # If the checkout step failed (e.g., repository not found because wiki is uninitialized),
          # we manually initialize a repository.
          if [ ! -d ".wiki/.git" ]; then
            echo "Wiki repository not found locally. It might be uninitialized."
            mkdir -p .wiki
            cd .wiki
            git init
            git remote add origin ${WIKI_REPO}
            cd ..
          fi
          
          cd .wiki
          # Remove old wiki files except the .git directory
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          
          # Copy the newly generated and collected markdown files
          cp -R /tmp/wiki-build/* .
          
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and Push
          git add .
          git commit -m "docs: auto-update wiki and sidebar [skip ci]" || echo "No changes to commit"
          
          # Force push to master, as wikis typically use master
          git push -u origin HEAD:master --force
